name: Check if first tag
description: 'Reusable action to check if the current commit is the first tag in the repository.'

# Ref: https://haya14busa.github.io/github-action-brandings/
branding:
  icon: tag
  color: red

outputs:
  is-first-tag:
    description: 'Whether the current commit is the first tag in the repository'
    value: ${{ steps.first-release-tag.outputs.is-first-release-tag }}

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Detect first release tag
      id: first-release-tag
      if: ${{ steps.set-vars.outputs.is-tag-create-workflow == 'true' }}
      uses: actions/github-script@v9
      with:
        script: |
          const refName = process.env.GITHUB_REF_NAME
          const { owner, repo } = context.repo
          const { data: tags } = await github.rest.repos.listTags({
            owner,
            repo,
            per_page: 2,
          })

          const isFirstReleaseTag = tags.length === 1 && tags[0]?.name === refName
          core.info(`first release tag check: tags=${tags.map(t => t.name).join(', ')}`)
          core.setOutput('is-first-release-tag', isFirstReleaseTag ? 'true' : 'false')
