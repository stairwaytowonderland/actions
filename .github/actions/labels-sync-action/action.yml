name: 'Sync Org Default Labels'
description: 'Syncs a standardized set of labels across all active organization repositories'

inputs:
  org:
    description: 'GitHub organization to sync labels in (defaults to the organization of the repository this action is run in)'
    required: false
  github-token:
    description: 'Privileged token with access to all organization repositories'
    required: true
  dry-run:
    description: 'Dry run'
    required: false
  update-existing:
    description: 'Whether to update existing labels with the same name to match the provided color and description (instead of leaving them unchanged).'
    required: false
  repos:
    description: 'Specific repositories to sync (comma-separated, e.g. "repo1,repo2"). If not provided, all active repositories will be synced.'
    required: false
  repos-ignore:
    description: 'Names or patterns (regex) of repositories to ignore (e.g. /^.github.*$/, /^personal-?.*$/).'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Run Label Sync Script
      uses: actions/github-script@v9
      env:
        ORG: ${{ inputs.org }}
        DRY_RUN: ${{ inputs.dry-run == 'true' }}
        UPDATE_EXISTING: ${{ inputs.update-existing == 'true' }}
        REPOS_IGNORE: ${{ inputs.repos-ignore }}
        REPOS: ${{ inputs.repos }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const dryRun = process.env.DRY_RUN === 'true';
          const updateExisting = process.env.UPDATE_EXISTING === 'true';

          // 1. Define your organization's custom default labels here
          const defaultLabels = [
            { name: "bug", color: "d73a4a", description: "Something isn't working" },
            { name: "documentation", color: "0075ca", description: "Improvements or additions to documentation" },
            { name: "duplicate", color: "cfd3d7", description: "This issue or pull request already exists" },
            { name: "enhancement", color: "a2eeef", description: "New feature or request" },
            { name: "good first issue", color: "7057ff", description: "Good for newcomers" },
            { name: "help wanted", color: "008672", description: "Extra attention is needed" },
            { name: "invalid", color: "e4e669", description: "This doesn't seem right" },
            { name: "question", color: "d876e3", description: "Further information is requested" },
            { name: "wontfix", color: "ffffff", description: "This will not be worked on" }
          ];

          const effortLabels = [
            { name: "effort:low", color: "adfcc0", description: "Requires minimal effort" },
            { name: "effort:medium", color: "bfd4f2", description: "Requires moderate effort" },
            { name: "effort:high", color: "fa2251", description: "Requires significant effort" }
          ];

          const impactLabels = [
            { name: "impact:low", color: "c2e0c6", description: "Low impact on users" },
            { name: "impact:medium", color: "dfd4f2", description: "Medium impact on users" },
            { name: "impact:high", color: "e5abc7", description: "High impact on users" }
          ];

          const priorityLabels = [
            { name: "priority:low", color: "baf165", description: "Low priority" },
            { name: "priority:medium", color: "141c90", description: "Medium priority" },
            { name: "priority:high", color: "ff2bbf", description: "High priority" }
          ];

          const otherLabels = [
            { "name": "poc", "color": "0fd40a", "description": "Proof of concept" },
            { "name": "task", "color": "005fff", "description": "General task" },
            { "name": "security", "color": "fbca04", "description": "Something is a security risk" },
            { "name": "uncategorized", "color": "6302ab", "description": "Needs to be categorized" }
          ];

          const targetLabels = [
            ...effortLabels,
            ...impactLabels,
            ...priorityLabels,
            ...otherLabels
          ];

          const org = process.env.ORG || context.repo.owner;

          let activeRepos = [];
          let specifiedRepos = [];
          let ignorePatterns = [];
          let specifiedActiveRepos = [];
          let filteredRepos = [];

          try {
            // 2. Fetch all non-archived repositories in the organization
            core.info(`Fetching repositories for organization: ${org}`);
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: org,
              type: 'all',
              per_page: 100
            });

            activeRepos = repos.filter(repo => !repo.archived);
            core.info(`Found ${activeRepos.length} active repositories to process`);

            specifiedRepos = (process.env.REPOS || '')
              .split('\n')
              .map(pattern => pattern.trim())
              .filter(Boolean)
              .map(pattern => new RegExp(pattern));

            specifiedActiveRepos = activeRepos;
            if (specifiedRepos.length > 0) {
              specifiedActiveRepos = specifiedActiveRepos.filter(repo => specifiedRepos.some(pattern => pattern.test(repo.name))).sort((a, b) => a.name.localeCompare(b.name));
              core.info(`After filtering, ${specifiedActiveRepos.length} repositories will be processed`);
              core.info(`Repositories to be processed after filtering: ${specifiedActiveRepos.map(r => r.name).join(', ')}`);
            }

            // Filter out ignored repositories based on patterns
            ignorePatterns = (process.env.REPOS_IGNORE || '')
              .split('\n')
              .map(pattern => pattern.trim())
              .filter(Boolean)
              .map(pattern => new RegExp(pattern));

            filteredRepos = specifiedActiveRepos;
            if (ignorePatterns.length > 0) {
              filteredRepos = filteredRepos.filter(repo => !ignorePatterns.some(pattern => pattern.test(repo.name))).sort((a, b) => a.name.localeCompare(b.name));
              core.info(`Found ${filteredRepos.length} active repositories to process after applying ignore patterns`);
              core.info(`Repositories to be processed: ${filteredRepos.map(r => r.name).join(', ')}`);
            }

            // 3. Loop through each repository and update labels
            for (const repo of filteredRepos) {

              core.info(`Processing Repository: ${repo.name}`);
              // Get current labels for this specific repo
              const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner: org,
                repo: repo.name,
                per_page: 100
              });

              const existingLabelNames = existingLabels.map (l => l.name.toLowerCase());

              for (const target of targetLabels) {
                const labelExists = existingLabelNames.includes(target.name.toLowerCase());

                if (labelExists) {
                  if (!updateExisting) {
                    core.warning(`Label "${target.name}" already exists in ${repo.name}, skipping (update existing is false)`);
                    continue;
                  }

                  // Update the label if it already exists to align colors/descr
                  core.info(`Updating existing label: "${target.name}" in ${repo.name}`);

                  if (!dryRun) {
                    await github.rest.issues.updateLabel({
                      owner: org,
                      repo: repo.name,
                      name: target.name,
                      color: target.color,
                      description: target.description
                    });
                  }
                } else {
                  // Create the label if it does not exist
                  core.info(`Creating new label: "${target.name}" in ${repo.name}`);

                  if (!dryRun) {
                    await github.rest.issues.createLabel({
                      owner: org,
                      repo: repo.name,
                      name: target.name,
                      color: target.color,
                      description: target.description
                    });
                  }
                }
              }
            }
            if (dryRun) {
              core.info("Dry run complete - no labels were created or updated.");
            } else {
              core.info("Label synchronization complete across all repositories!");
            }
          } catch (error) {
            core.setFailed(`Action failed with error: ${error.message}`);
          }

          const summary = [
            '### Label Sync Summary\n',
            dryRun ? '\nNo labels were created or updated (dry run).\n' : '\nLabels were created/updated as needed.\n',
            '\n#### Organization', org,
            '\n#### Total active repositories found', activeRepos.length,
            '\n#### Total repositories processed', filteredRepos.length,
            '\n#### Specified repositories (if any)', specifiedActiveRepos.length > 0 ? specifiedActiveRepos.map(r => '`' + r.name + '`').join(', ') : 'None (all active repositories included)',
            '\n#### Ignore patterns applied (if any)', ignorePatterns.length > 0 ? ignorePatterns.map(p => '`' + p.toString() + '`').join(', ') : 'None',
            '\n#### Target labels that should exist in each repository',
            ...targetLabels.map(l => `- ${l.name} (#${l.color}) — ${l.description}`)
          ];

          await core.summary.addRaw(summary.join('\n')).write();
          core.setOutput('target-labels', JSON.stringify(targetLabels.map(l => l.name)));
