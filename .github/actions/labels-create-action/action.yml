name: 'Create Needed Labels'
description: 'Reusable action to ensure all needed labels exist in the repository.'

inputs:
  owner:
    description: 'GitHub organization or user that owns the repository'
    required: false
  repo:
    description: 'GitHub repository name (if not the current repository)'
    required: false
  types:
    description: 'JSON array of types in order of processing (default: ["bug","feature","documentation","task"])'
    default: |
      ["bug","feature","documentation","task"]
  effort-labels:
    description: 'JSON array of effort label objects (name, color, description)'
    default: |
      [
        { "name": "effort:high", "color": "FA1070", "description": "High effort" },
        { "name": "effort:medium", "color": "BFD4F2", "description": "Medium effort" },
        { "name": "effort:low", "color": "ADFCC0", "description": "Low effort" }
      ]
  impact-labels:
    description: 'JSON array of impact label objects (name, color, description)'
    default: |
      [
        { "name": "impact:high", "color": "E5ABC7", "description": "High impact" },
        { "name": "impact:medium", "color": "DFD4F2", "description": "Medium impact" },
        { "name": "impact:low", "color": "C2E0C6", "description": "Low impact" }
      ]
  priority-labels:
    description: 'JSON array of priority label objects (name, color, description)'
    default: |
      [
        { "name": "priority:high", "color": "FF2BBF", "description": "High priority" },
        { "name": "priority:medium", "color": "141C90", "description": "Medium priority" },
        { "name": "priority:low", "color": "BAF165", "description": "Low priority" }
      ]
  default-labels:
    description: 'JSON array of default label objects (name, color, description)'
    default: |
      [
        { "name": "bug", "color": "FF0000", "description": "Something isn't working" },
        { "name": "documentation", "color": "0075CA", "description": "Improvements or additions to documentation" },
        { "name": "duplicate", "color": "CFD3D7", "description": "This issue or pull request already exists" },
        { "name": "enhancement", "color": "A2EEEF", "description": "New feature or request" },
        { "name": "good first issue", "color": "7057FF", "description": "Good for newcomers" },
        { "name": "help wanted", "color": "008672", "description": "Extra attention is needed" },
        { "name": "invalid", "color": "E4E669", "description": "This doesn't seem right" },
        { "name": "question", "color": "D876E3", "description": "Further information is requested" },
        { "name": "wontfix", "color": "FFFFFF", "description": "This will not be worked on" }
      ]
  dependabot-labels:
    description: 'JSON array of dependabot label objects (name, color, description)'
    default: |
      [
        { "name": "dependencies", "color": "F0FFFF", "description": "Related to dependabot dependencies" },
        { "name": "go", "color": "16E2E2", "description": "Related to Go dependencies" },
        { "name": "ruby", "color": "CC342D", "description": "Related to Ruby dependencies" },
        { "name": "python", "color": "306998", "description": "Related to Python dependencies" },
        { "name": "docker", "color": "21CEFF", "description": "Related to Docker dependencies" },
        { "name": "terraform", "color": "7B42BC", "description": "Related to Terraform dependencies" },
        { "name": "javascript", "color": "168700", "description": "Related to JavaScript dependencies" },
        { "name": "github_actions", "color": "000000", "description": "Related to GitHub Actions dependencies" }
      ]
  other-labels:
    description: 'JSON array of other (misc) label objects (name, color, description)'
    default: |
      [
        { "name": "poc", "color": "0FD40A", "description": "Proof of concept" },
        { "name": "task", "color": "003FFF", "description": "General task" },
        { "name": "security", "color": "FBCA04", "description": "Something is a security risk" },
        { "name": "uncategorized", "color": "800949", "description": "Needs to be categorized" }
      ]
  effort-map:
    description: 'JSON object mapping effort values to normalized label names'
    default: |
      { "high": "high", "larger": "high", "large": "high", "medium": "medium", "low": "low", "smaller": "low", "small": "low" }
  impact-map:
    description: 'JSON object mapping impact values to normalized label names'
    default: |
      { "higher": "high", "high": "high", "medium": "medium", "lower": "low", "low": "low" }
  priority-map:
    description: 'JSON object mapping priority values to normalized label names'
    default: |
      { "higher": "high", "high": "high", "medium": "medium", "lower": "low", "low": "low" }
  matrix:
    description: 'JSON matrix of issues to process (from parse-csv output)'
    required: false
  dry-run:
    description: 'Dry run'
  github-token:
    description: 'GitHub token for authentication'
    default: ${{ github.token }}
  update-existing:
    description: 'Whether to update existing labels with the same name to match the provided color and description (instead of leaving them unchanged).'
    required: false

outputs:
  created-labels:
    description: 'JSON array of needed label names that were created or already exist'
    value: ${{ steps.ensure.outputs.created-labels }}

runs:
  using: 'composite'
  steps:
    - name: Ensure only needed labels exist
      uses: actions/github-script@v9
      env:
        PRIORITY_LABELS: ${{ inputs.priority-labels }}
        EFFORT_LABELS: ${{ inputs.effort-labels }}
        IMPACT_LABELS: ${{ inputs.impact-labels }}
        DEFAULT_LABELS: ${{ inputs.default-labels }}
        DEPENDABOT_LABELS: ${{ inputs.dependabot-labels }}
        OTHER_LABELS: ${{ inputs.other-labels }}
        PRIORITY_MAP: ${{ inputs.priority-map }}
        IMPACT_MAP: ${{ inputs.impact-map }}
        EFFORT_MAP: ${{ inputs.effort-map }}
        MATRIX: ${{ inputs.matrix }}
        DRY_RUN: ${{ inputs.dry-run == 'true' }}
        UPDATE_EXISTING: ${{ inputs.update-existing == 'true' }}
        TYPES: ${{ inputs.types }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const priorityLabels = JSON.parse(process.env.PRIORITY_LABELS);
          const effortLabels = JSON.parse(process.env.EFFORT_LABELS);
          const impactLabels = JSON.parse(process.env.IMPACT_LABELS);
          const otherLabels = JSON.parse(process.env.OTHER_LABELS);
          const defaultLabels = JSON.parse(process.env.DEFAULT_LABELS);
          const dependabotLabels = JSON.parse(process.env.DEPENDABOT_LABELS);
          const targetLabels = [
            ...priorityLabels,
            ...effortLabels,
            ...impactLabels,
            ...defaultLabels,
            ...dependabotLabels,
            ...otherLabels
          ];
          const priorityMap = JSON.parse(process.env.PRIORITY_MAP);
          const effortMap = JSON.parse(process.env.EFFORT_MAP);
          const impactMap = JSON.parse(process.env.IMPACT_MAP);
          let raw = process.env.MATRIX || '{}';
          if (raw.startsWith('"')) raw = JSON.parse(raw);
          const matrix = JSON.parse(raw);
          const needed = new Set();
          // Aggregate all rows from all groups (bug, feature, documentation, task)
          const allRows = [];
          const types = JSON.parse(process.env.TYPES || '[]').map(t => t.trim());
          const hasTypes = types && types.length > 0;
          if (!hasTypes) {
            // If no types specified, consider all groups in the matrix
            for (const group in matrix) {
              if (matrix[group] && Array.isArray(matrix[group].include)) {
                allRows.push(...matrix[group].include);
              }
            }
          } else {
            for (const group of types) {
              if (matrix[group] && Array.isArray(matrix[group].include)) {
                allRows.push(...matrix[group].include);
              }
            }
          }
          const hasMatrixRows = allRows.length > 0;
          for (const row of allRows) {
            const priority = priorityMap[(row.priority || '').toLowerCase()];
            if (priority) needed.add(`priority:${priority}`);
            const effort = effortMap[(row.effort || '').toLowerCase()];
            if (effort) needed.add(`effort:${effort}`);
            const impact = impactMap[(row.impact || '').toLowerCase()];
            if (impact) needed.add(`impact:${impact}`);
            if (/bugs?|fix|errors?|fail/i.test(row.title)) needed.add('bug');
            else if (/feat:|features?|implement|support/i.test(row.title)) needed.add('feature');
            else if (/docs?:|documentation/i.test(row.title)) needed.add('documentation');
            else needed.add('task');
          }
          const owner = process.env.OWNER || context.repo.owner;
          const repo = process.env.REPO || context.repo.repo;
          const dryRun = process.env.DRY_RUN === 'true';
          const updateExisting = process.env.UPDATE_EXISTING === 'true';
          if (!dryRun) {
            for (const label of targetLabels) {
              // If matrix is omitted/empty, apply all configured labels.
              if (hasMatrixRows && !needed.has(label.name)) continue;
              try {
                await github.rest.issues.getLabel({
                  owner: owner,
                  repo: repo,
                  name: label.name
                });
                if (updateExisting) {
                  await github.rest.issues.updateLabel({
                    owner: owner,
                    repo: repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                }
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner: owner,
                  repo: repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              }
            }
          }
          const neededLabels = hasMatrixRows
            ? targetLabels.filter(l => needed.has(l.name))
            : targetLabels;
          const labelBaseUrl = `https://github.com/${owner}/${repo}/labels/?q=`;

          // Check which labels already exist
          let existingLabels = [];
          try {
            const { data: repoLabels } = await github.rest.issues.listLabelsForRepo({
              owner: owner,
              repo: repo,
              per_page: 100
            });
            existingLabels = repoLabels.map(l => l.name);
          } catch (e) {
            // ignore
          }
          const neededButMissing = neededLabels.filter(l => !existingLabels.includes(l.name));
          const alreadyExisting = neededLabels.filter(l => existingLabels.includes(l.name));

          const summary = [
            '### Labels Processed\n',
            dryRun ? '\nLabel(s) not created (dry run).\n' : '',
            '\n**Owner/Repository:**', `${owner}/${repo}`,
            '\n**Needed labels (created or updated):**',
            ...neededButMissing.map(l => {
              const color = l.color;
              const labelColor = `#${color}`;
              const labelLink = dryRun
                ? l.name
                : `[${l.name}](${labelBaseUrl}${encodeURIComponent(l.name)})`;
              return `- ${labelLink} — ${labelColor}`;
            }),
            '\n**Existing labels:**',
            ...alreadyExisting.map(l => {
              const color = l.color;
              const labelColor = `#${color}`;
              // Always render as a link if the label exists, even in dry run
              const labelLink = `[${l.name}](${labelBaseUrl}${encodeURIComponent(l.name)})`;
              return `- ${labelLink} — ${labelColor}`;
            }),
          ].join('\n');
          await core.summary.addRaw(summary + '\n').write();
          core.setOutput('created-labels', JSON.stringify(neededLabels.map(l => l.name)));
