# See https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file for details on configuring this file
version: 2
# registries:
#   # https://docs.github.com/en/code-security/how-tos/secure-your-supply-chain/manage-your-dependency-security/configure-access-to-private-registries#git
#   github:
#     type: git
#     url: https://github.com/
#     username: x-access-token
#     password: ${{ secrets.GH_PAT_DEPENDABOT }}
updates:
  # https://docs.github.com/en/code-security/how-tos/secure-your-supply-chain/manage-your-dependency-security/customizing-dependabot-security-prs
  - package-ecosystem: 'github-actions'
    directories:
      - './.github/workflows'
      - '.github/actions/**'
    exclude-paths:
      - '.github/workflows/ci*.yaml'
      - '.github/workflows/create-labels.yaml'
      - '.github/workflows/sync-labels.yaml'
      - '.github/workflows/importcsv-issues.yaml'
    schedule:
      # interval: "monthly"
      # day: "friday"
      # internal: "daily" # Can be daily, weekly, or monthly
      interval: 'weekly'
      timezone: 'America/Chicago'
    labels: ['dependencies', 'deps:github-actions']
    commit-message:
      prefix: 'ci'
      include: 'scope' # Automatically appends "(deps)" -> chore(deps):
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
    open-pull-requests-limit: 5 # Limits active PRs to prevent noise
    rebase-strategy: 'auto'
    assignees: ['andrewhaller']
  - package-ecosystem: 'github-actions'
    directories:
      - '/'
    # Prevent Dependabot from checking workflows inside these paths
    exclude-paths:
      - '.github/actions/**'
      - '.github/workflows/release*.yaml'
      - '.github/workflows/publish.yaml'
      - '.github/workflows/pre-commit.yaml'
      - '.github/workflows/conventional-commit.yaml'
      - '.github/workflows/terraform-deploy.yaml'
      - '.github/workflows/repository-created.yaml'
      - '.github/workflows/watchers.yaml'
    schedule:
      # interval: "monthly"
      # day: "friday"
      # internal: "daily" # Can be daily, weekly, or monthly
      interval: 'weekly'
      timezone: 'America/Chicago'
    labels: ['dependencies', 'deps:github-actions']
    commit-message:
      prefix: 'chore'
      include: 'scope' # Automatically appends "(deps)" -> ci(deps):
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
    open-pull-requests-limit: 5 # Limits active PRs to prevent noise
    rebase-strategy: 'auto'
    assignees: ['andrewhaller']
