name: CI Meta

on:
  workflow_call:
    inputs:
      publish:
        description: 'Whether to publish a new release'
        type: boolean
      action-ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string
        default: 'v1'
    outputs:
      is-release-workflow:
        description: 'Whether this workflow is a release workflow.'
        value: ${{ jobs.meta.outputs.is-release-workflow }}
      is-publish-workflow:
        description: 'Whether this workflow is a publish workflow.'
        value: ${{ jobs.meta.outputs.is-publish-workflow }}
      has-release-tags:
        description: 'Whether the repository has any release tags.'
        value: ${{ jobs.meta.outputs.has-release-tags }}

permissions:
  contents: read

# Use PAT instead of GITHUB_TOKEN to cause semantic-release to trigger tag pipeline when tag is created.
# 'Fine-grained token' repo permissions: Contents

jobs:
  meta:
    name: Meta
    runs-on: ubuntu-latest
    outputs:
      is-release-workflow: ${{ steps.set-vars.outputs.is-release-workflow }}
      is-publish-workflow: ${{ steps.set-vars.outputs.is-publish-workflow }}
      has-release-tags: ${{ steps.release-tags.outputs.has-release-tags }}

    steps:
      - name: Check if this is the first commit
        id: check-if-first-commit
        uses: stairwaytowonderland/actions/.github/actions/first-commit-action@v1

      - name: Get repo info
        id: repo-info
        uses: stairwaytowonderland/actions/.github/actions/repo-info-action@v1

      - name: Check workflow type
        id: set-vars
        env:
          IS_RELEASE_WORKFLOW: ${{ startsWith(github.ref, 'refs/heads/main') && ! inputs.publish }}
          IS_PUBLISH_WORKFLOW: ${{ inputs.publish || (startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push') }}
        run: |
          {
            echo "is-release-workflow=$IS_RELEASE_WORKFLOW"
            echo "is-publish-workflow=$IS_PUBLISH_WORKFLOW"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout shared actions repo
        uses: actions/checkout@v7
        with:
          repository: stairwaytowonderland/actions
          path: ./.actions
          ref: ${{ inputs.action-ref }}
          persist-credentials: false
          sparse-checkout: |
            .github

      - name: Detect existing release tags
        id: release-tags
        if: ${{ steps.set-vars.outputs.is-release-workflow == 'true' }}
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo
            const { data: tags } = await github.rest.repos.listTags({
              owner,
              repo,
              per_page: 1,
            })
            const hasReleaseTags = tags.length > 0
            core.info(`has-release-tags=${hasReleaseTags}`)
            core.setOutput('has-release-tags', hasReleaseTags ? 'true' : 'false')

      - name: Show vars
        if: ${{ steps.set-vars.outputs.is-publish-workflow == 'true' }}
        run: |
          echo "is-release-workflow=${{ steps.set-vars.outputs.is-release-workflow == 'true' }}"
          echo "is-publish-workflow=${{ steps.set-vars.outputs.is-publish-workflow == 'true' }}"
          echo "has-release-tags=${{ steps.release-tags.outputs.has-release-tags == 'true' }}"
          echo "github.ref=${{ github.ref }}"
