name: Import Issues from CSV

concurrency:
  group: ${{github.repository}}-${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        required: false
        type: string
        default: 'v1'

      node-version:
        description: 'Node.js version to use for parsing CSV (e.g. 18, 20, 24)'
        required: false
        type: string
        default: '24'

      dry-run:
        description: 'Dry run'
        required: false
        type: boolean
        default: true

      max-parallel:
        description: 'Maximum number of parallel issue creations (only applies when batch is false)'
        required: false
        type: number
        default: 5

      batch:
        description: 'Create issues in batches (by type)'
        required: false
        type: boolean
        default: true

      allow-duplicates:
        description: 'Allow creating duplicate issues'
        required: false
        type: boolean
        default: false

      allow-closed-duplicates:
        description: 'Allow creating duplicate issues for closed issues'
        required: false
        type: boolean
        default: false

      csv-path:
        description: 'Path (relative) to the CSV file'
        required: true
        type: string
        default: 'TODO.csv'

  workflow_call:
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with permissions to create issues'
        required: false

    inputs:
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        required: false
        type: string
        default: 'v1'

      node-version:
        description: 'Node.js version to use for parsing CSV (e.g. 18, 20, 24)'
        required: false
        type: string
        default: '24'

      dry-run:
        description: 'Dry run'
        required: false
        type: boolean
        default: true

      max-parallel:
        description: 'Maximum number of parallel issue creations (only applies when batch is false)'
        required: false
        type: number
        default: 5

      batch:
        description: 'Create issues in batches (by type)'
        required: false
        type: boolean
        default: true

      allow-duplicates:
        description: 'Allow creating duplicate issues'
        required: false
        type: boolean
        default: false

      allow-closed-duplicates:
        description: 'Allow creating duplicate issues for closed issues'
        required: false
        type: boolean
        default: false

      csv-path:
        description: 'Path (relative) to the CSV file'
        required: true
        type: string
        default: 'TODO.csv'

jobs:
  # check-token:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Check token scopes
  #       run: |
  #         curl -sI -H "Authorization: token ${TOKEN}" https://api.github.com | grep -i 'X-OAuth-Scopes'
  #       env:
  #         TOKEN: ${{ secrets.github-token || secrets.GH_PAT_CREATE_ISSUE }}

  #     - name: Check token identity
  #       run: |
  #         curl -s -H "Authorization: token ${TOKEN}" https://api.github.com/user
  #       env:
  #         TOKEN: ${{ secrets.github-token || secrets.GH_PAT_CREATE_ISSUE }}

  #     - name: Check token limit
  #       run: |
  #         curl -s -H "Authorization: token ${TOKEN}" https://api.github.com/rate_limit
  #       env:
  #         TOKEN: ${{ secrets.github-token || secrets.GH_PAT_CREATE_ISSUE }}

  parse-csv:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      types: ${{ steps.parse.outputs.types }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout shared actions repo
        uses: actions/checkout@v6
        with:
          repository: stairwaytowonderland/actions
          path: ./.actions
          sparse-checkout: |
            .github
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install PapaParse
        run: npm install papaparse

      - name: Parse CSV and build matrix
        id: parse
        uses: ./.actions/.github/actions/parse-issue-csv-action
        with:
          csv-path: ${{ inputs.csv-path }}

      - name: Show outputs
        uses: actions/github-script@v9
        env:
          MATRIX: ${{ steps.parse.outputs.matrix }}
          TYPES: ${{ steps.parse.outputs.types }}
        with:
          script: |
            const matrix = JSON.parse(process.env.MATRIX);
            const types = JSON.parse(process.env.TYPES);
            console.log("matrix:", matrix);
            console.log("types:", types);
            console.log(`Total issues parsed: ${types.reduce((sum, type) => sum + (matrix[type].include.length || 0), 0)}`);
            console.log(`Issues by type: ${types.map(type => `${type}: ${matrix[type].include.length || 0}`).join(', ')}`);

      - name: Set lengths
        uses: actions/github-script@v9
        env:
          MATRIX: ${{ steps.parse.outputs.matrix }}
          TYPES: ${{ steps.parse.outputs.types }}
        with:
          script: |
            const matrix = JSON.parse(process.env.MATRIX);
            const types = JSON.parse(process.env.TYPES);
            console.log(`Total issues parsed: ${types.reduce((sum, type) => sum + (matrix[type].include.length || 0), 0)}`);
            console.log(`Issues by type: ${types.map(type => `${type}: ${matrix[type].include.length || 0}`).join(', ')}`);
            for (const type of types) {
              const count = (matrix[type] && matrix[type].include) ? matrix[type].include.length : 0;
              console.log(`${type}-count: ${count}`);
              core.setOutput(`${type}-count`, count);
            }

  create-labels:
    runs-on: ubuntu-latest
    needs: parse-csv
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout shared actions repo
        uses: actions/checkout@v6
        with:
          repository: stairwaytowonderland/actions
          path: ./.actions
          sparse-checkout: |
            .github
          ref: ${{ inputs.ref }}

      - name: Ensure only needed labels exist
        uses: ./.actions/.github/actions/labels-create-action
        with:
          matrix: ${{ toJson(needs.parse-csv.outputs.matrix) }}
          dry-run: ${{ inputs.dry-run }}
          github-token: ${{ secrets.github-token || secrets.GH_PAT_CREATE_ISSUE }}

  create-issue-batch:
    if: ${{ inputs.batch }}
    needs: [parse-csv, create-labels]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        type: ${{ fromJson(needs.parse-csv.outputs.types) }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout shared actions repo
        uses: actions/checkout@v6
        with:
          repository: stairwaytowonderland/actions
          path: ./.actions
          sparse-checkout: |
            .github
          ref: ${{ inputs.ref }}

      - name: Create issues by type
        if: ${{ fromJson(needs.parse-csv.outputs.matrix)[matrix.type].include[0] != null }}
        uses: ./.actions/.github/actions/issue-create-action
        with:
          batch-json: ${{ toJson(fromJson(needs.parse-csv.outputs.matrix)[matrix.type].include) }}
          allow-duplicates: ${{ inputs.allow-duplicates }}
          allow-closed-duplicates: ${{ inputs.allow-closed-duplicates }}
          dry-run: ${{ inputs.dry-run }}
          github-token: ${{ secrets.github-token || secrets.GH_PAT_CREATE_ISSUE }}

  merge-matrix:
    if: ${{ !inputs.batch }}
    needs: parse-csv
    runs-on: ubuntu-latest
    outputs:
      all: ${{ steps.merge.outputs.all }}
    steps:
      - name: Merge all issue arrays
        id: merge
        uses: actions/github-script@v9
        env:
          MATRIX: ${{ needs.parse-csv.outputs.matrix }}
          TYPES: ${{ needs.parse-csv.outputs.types }}
        with:
          script: |
            const matrix = JSON.parse(process.env.MATRIX);
            const types = JSON.parse(process.env.TYPES);
            const merged = [];
            for (const type of types) {
              if (matrix[type] && Array.isArray(matrix[type].include)) {
                merged.push(...matrix[type].include);
              }
            }
            core.setOutput('all', JSON.stringify(merged));

  create-issue:
    if: ${{ !inputs.batch }}
    needs: [merge-matrix, create-labels]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: ${{ inputs.max-parallel }}
      matrix:
        issue: ${{ fromJson(needs.merge-matrix.outputs.all) }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout shared actions repo
        uses: actions/checkout@v6
        with:
          repository: stairwaytowonderland/actions
          path: ./.actions
          sparse-checkout: |
            .github
          ref: ${{ inputs.ref }}

      - name: Create issue
        uses: ./.actions/.github/actions/issue-create-action
        with:
          title: ${{ matrix.issue.title }}
          priority: ${{ matrix.issue.priority }}
          effort: ${{ matrix.issue.effort }}
          description: ${{ matrix.issue.description }}
          status: ${{ matrix.issue.status }}
          completed: ${{ matrix.issue.completed }}
          dry-run: ${{ inputs.dry-run }}
          allow-duplicates: ${{ inputs.allow-duplicates }}
          allow-closed-duplicates: ${{ inputs.allow-closed-duplicates }}
          github-token: ${{ secrets.github-token || secrets.GH_PAT_CREATE_ISSUE }}
