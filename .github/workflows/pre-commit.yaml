name: Pre-commit

on:
  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      config:
        description: 'Path to the pre-commit config file.'
        type: string
        required: false
        default: '.pre-commit-config.yaml'

jobs:
  pre-commit:
    name: Run pre-commit checks
    uses: stairwaytowonderland/create-release/.github/workflows/pre-commit.yaml@main
    with:
      config: ${{ github.event.inputs.config }}
