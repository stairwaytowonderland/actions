name: CI

on:
  push:
    # Trigger 1: When main branch is updated (respects path ignores)
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'

    # Trigger 2: When a version tag is pushed
    tags:
      - 'v*'

  workflow_call:
    inputs:
      normalize-majorver:
        description: 'Whether to normalize major version tags (e.g. v1.0.0 → v1).'
        type: boolean
      publish:
        description: 'Whether to run in publish mode.'
        type: boolean
      tag:
        description: 'Existing release tag to publish (e.g. v1.2.3)'
        type: string
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        type: string
      action-ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string
    # secrets:
    #   github-token:
    #     description: 'GitHub Personal Access Token with repo scope for creating releases.'

  workflow_dispatch:
    inputs:
      normalize-majorver:
        description: 'Whether to normalize major version tags (e.g. v1.0.0 → v1).'
        type: boolean
      publish:
        description: 'Whether to run in publish mode.'
        type: boolean
      tag:
        description: 'Existing release tag to publish (e.g. v1.2.3)'
        type: string
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        type: string
      action-ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string

concurrency:
  group: ${{ format('{0}-{1}-{2}-{3}', github.repository_id, github.workflow, github.event_name, github.ref || github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

# Use PAT instead of GITHUB_TOKEN to cause semantic-release to trigger tag pipeline when tag is created.
# 'Fine-grained token' repo permissions: Contents

jobs:
  meta:
    name: Meta
    uses: ./.github/workflows/ci-meta.yaml
    permissions:
      contents: read
    with:
      action-ref: ${{ inputs.action-ref }}
      publish: ${{ inputs.publish == true || (inputs.tag != '' && inputs.notes-b64 != '') }}

  release:
    name: Release
    needs: [meta]
    if: ${{ needs.meta.outputs.is-release-workflow == 'true' }}
    uses: ./.github/workflows/release.yaml
    secrets: inherit
    with:
      action-ref: ${{ inputs.action-ref }}
      dispatch-workflow: ${{ needs.meta.outputs.has-release-tags != 'true' && 'ci.yml' || '' }}
      normalize-majorver: ${{ inputs.normalize-majorver == true }}
      fail-on-no-release: true

  publish:
    name: Publish
    needs: [meta]
    if: ${{ needs.meta.outputs.is-publish-workflow == 'true' }}
    uses: ./.github/workflows/publish.yaml
    permissions:
      contents: write
    secrets: inherit
    with:
      action-ref: ${{ inputs.action-ref }}
      tag: ${{ inputs.tag || github.ref_name }}
      notes-b64: ${{ inputs.notes-b64 }}

  normalize-majorver:
    name: Normalize Major Version Tag
    if: (github.repository == 'stairwaytowonderland/actions' && startsWith(github.ref, 'refs/tags/v')) || inputs.normalize-majorver == true
    needs: [publish]
    uses: ./.github/workflows/normalize-majorver.yaml
    permissions:
      contents: write
    # secrets:
    #   github-token: ${{ secrets.github-token || '' }}
