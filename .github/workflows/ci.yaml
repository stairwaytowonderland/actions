name: CI

############################################################
# This workflow is designed to also be reusable by other workflows
# (e.g. ci.yaml in another repository)

# permissions:
#   actions: write
#   contents: write
#   issues: write
#   pull-requests: write

# jobs:
#   release-and-publish:
#     name: Release and Publish
#     uses: stairwaytowonderland/actions/.github/workflows/ci.yaml@v1
#     secrets: inherit
#     with:
#       first-release-dispatch-workflow: ci.yaml
#       # The following inputs are required in the workflow specified by first-release-dispatch-workflow (e.g. the ci.yaml in this case):
#       tag: ${{ inputs.tag }}
#       notes-b64: ${{ inputs.notes-b64 }}

#   normalize-majorver:
#     name: Normalize Major Version Tag
#     needs: [release-and-publish]
#     if: needs.release-and-publish.outputs.release-published == 'true'
#     runs-on: ubuntu-latest
#     permissions:
#       contents: write
#     steps:
#       - name: Normalize Major Version Tag
#         uses: stairwaytowonderland/normalize-majorver@v1
############################################################

on:
  push:
    # Trigger 1: When main branch is updated (respects path ignores)
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'

    # Trigger 2: When a version tag is pushed
    tags:
      - 'v*'

  workflow_call:
    inputs:
      fail-on-no-release:
        description: 'Fail the workflow if no release is published (e.g. if there are no relevant commits).'
        type: boolean
      first-release-dispatch-workflow:
        description: 'The workflow file to dispatch after a successful release.'
        type: string
      tag:
        description: 'Existing release tag to publish (e.g. v1.2.3)'
        type: string
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        type: string
      action-ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string
    outputs:
      version-released:
        description: 'Whether a new release was published.'
        value: ${{ jobs.release.outputs.new-release-published }}
      release-version:
        description: 'The version of the new release.'
        value: ${{ jobs.release.outputs.new-release-version }}
      release-git-tag:
        description: 'The git tag of the new release.'
        value: ${{ jobs.release.outputs.new-release-git-tag }}
      published-release-url:
        description: 'The URL of the published release.'
        value: ${{ jobs.publish.outputs.release-url }}
      published-release-tag:
        description: 'The tag of the published release.'
        value: ${{ jobs.publish.outputs.release-tag }}
      published-release-sha:
        description: 'The commit SHA of the published release.'
        value: ${{ jobs.publish.outputs.release-sha }}
      release-published:
        description: 'Whether a new release was published.'
        value: ${{ jobs.publish.outputs.release-published }}

  workflow_dispatch:
    inputs:
      fail-on-no-release:
        description: 'Fail the workflow if no release is published (e.g. if there are no relevant commits).'
        type: boolean
      first-release-dispatch-workflow:
        description: 'The workflow file to dispatch after a successful release.'
        type: string
      tag:
        description: 'Existing release tag to publish (e.g. v1.2.3)'
        type: string
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        type: string
      action-ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string

concurrency:
  group: ${{ format('{0}-{1}-{2}-{3}', github.repository_id, github.workflow, github.event_name, github.ref || github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  meta:
    name: Meta
    uses: ./.github/workflows/ci-meta.yaml
    permissions:
      contents: read
    with:
      action-ref: ${{ inputs.action-ref }}
      publish: ${{ inputs.tag != '' && inputs.notes-b64 != '' }}

  release:
    name: Release
    needs: [meta]
    if: needs.meta.outputs.is-release-workflow == 'true'
    uses: ./.github/workflows/release.yaml
    secrets: inherit
    with:
      action-ref: ${{ inputs.action-ref }}
      dispatch-workflow: ${{ needs.meta.outputs.has-release-tags != 'true' && inputs.first-release-dispatch-workflow || '' }}
      fail-on-no-release: ${{ inputs.fail-on-no-release == true }}

  publish-debug:
    name: Publish Debug Info
    needs: [meta]
    if: needs.meta.outputs.is-publish-workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Debug Info
        run: |
          echo "Inputs:"
          echo "  tag: ${{ inputs.tag }}"
          echo "  notes-b64: ${{ inputs.notes-b64 }}"
          echo "  action-ref: ${{ inputs.action-ref }}"
          echo "  first-release-dispatch-workflow: ${{ inputs.first-release-dispatch-workflow }}"
          echo "Meta Outputs:"
          echo "  is-release-workflow: ${{ needs.meta.outputs.is-release-workflow }}"
          echo "  is-publish-workflow: ${{ needs.meta.outputs.is-publish-workflow }}"
          echo "  has-release-tags: ${{ needs.meta.outputs.has-release-tags }}"
          echo "Conditions:"
          echo "  publish-test-01: ${{ needs.meta.outputs.is-publish-workflow == 'true' && (inputs.first-release-dispatch-workflow != '' && needs.meta.outputs.has-release-tags == 'true' || inputs.first-release-dispatch-workflow != '') }}"
          echo "  publish-test-02: ${{ needs.meta.outputs.is-publish-workflow == 'true' && ! (needs.meta.outputs.has-release-tags != 'true' && inputs.first-release-dispatch-workflow != '') }}"
          echo "  publish-test-03: ${{ needs.meta.outputs.is-publish-workflow == 'true' || (needs.meta.outputs.has-release-tags == 'true' && inputs.first-release-dispatch-workflow == '') }}"

  publish:
    name: Publish
    needs: [meta]
    # if: needs.meta.outputs.is-publish-workflow == 'true' && (inputs.first-release-dispatch-workflow != '' && needs.meta.outputs.has-release-tags == 'true' || inputs.first-release-dispatch-workflow != '')
    # if: needs.meta.outputs.is-publish-workflow == 'true' && ! (needs.meta.outputs.has-release-tags != 'true' && inputs.first-release-dispatch-workflow != '')
    if: needs.meta.outputs.is-publish-workflow == 'true' || (needs.meta.outputs.has-release-tags == 'true' && inputs.first-release-dispatch-workflow == '')
    uses: ./.github/workflows/publish.yaml
    permissions:
      contents: write
    secrets: inherit
    with:
      action-ref: ${{ inputs.action-ref }}
      tag: ${{ inputs.tag || github.ref_name }}
      notes-b64: ${{ inputs.notes-b64 }}

  normalize-majorver:
    name: Normalize Major Version Tag
    # if: (needs.publish.outputs.release-published == 'true' && github.repository == 'stairwaytowonderland/actions') || startsWith(github.ref, 'refs/tags/v')
    if: needs.publish.outputs.release-published == 'true' && github.repository == 'stairwaytowonderland/actions'
    needs: [publish]
    uses: ./.github/workflows/normalize-majorver.yaml
    permissions:
      contents: write
