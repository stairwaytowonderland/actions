name: Normalize Major Version Tag

on:
  workflow_run:
    workflows: [ci.yaml]
    types: [completed]
  workflow_dispatch:
  workflow_call:
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'

permissions:
  contents: write

# Use PAT instead of GITHUB_TOKEN to cause semantic-release to trigger tag pipeline when tag is created.
# 'Fine-grained token' repo permissions: Contents

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      is_valid_tag: ${{ steps.validate.outputs.is_valid_tag }}
    steps:
      - name: Validate Tag
        id: validate
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Bash native regex matching your pattern (e.g., v1.2.3)
          if [[ "$HEAD_BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_valid_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_valid_tag=false" >> $GITHUB_OUTPUT
          fi

  normalize-majorver:
    name: Normalize Major Version Tag
    runs-on: ubuntu-latest
    needs: [check-version]
    if: >
      github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (
        github.repository == 'stairwaytowonderland/actions' &&
        github.event.workflow_run.conclusion == 'success' &&
        needs.check-version.outputs.is_valid_tag == 'true'
      )
    steps:
      - uses: stairwaytowonderland/normalize-majorver@main
        with:
          github-token: ${{ secrets.github-token || github.token }}
