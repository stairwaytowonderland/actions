name: Normalize Major Version Tag

on:
  workflow_call:

permissions:
  contents: write

# Use PAT instead of GITHUB_TOKEN to cause semantic-release to trigger tag pipeline when tag is created.
# 'Fine-grained token' repo permissions: Contents

jobs:
  normalize-majorver:
    name: Normalize Major Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: stairwaytowonderland/normalize-majorver@main
