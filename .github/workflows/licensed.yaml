# This workflow checks the statuses of cached dependencies used in this action
# with the help of the Licensed tool. If any licenses are invalid or missing,
# this workflow will fail. See: https://github.com/licensee/licensed

name: Licensed

on:
  workflow_call:
    inputs:
      commit-message:
        description: 'The commit message to use when committing updated license files.'
        type: string
        default: 'Auto-update license files'
      commit-prefix:
        description: 'The commit prefix to use when committing updated license files.'
        type: string
        default: 'chore(licensed)'
      licensed-version:
        description: 'The Licensee/Licensed version to use.'
        type: string
        default: '4.x'
      node-caching:
        description: 'The Node.js cache key to use.'
        type: string
        default: 'npm'
      node-version-file:
        description: 'The Node.js version file to use.'
        type: string
        default: '.node-version'

permissions:
  contents: write
  pull-requests: write

jobs:
  licensed:
    name: Check Licenses
    runs-on: ubuntu-latest

    steps:
      - name: Get auth token
        id: auth-token
        uses: stairwaytowonderland/actions/.github/actions/auth-token-action@v1
        with:
          app-private-key: ${{ secrets.ORG_REPO_USER_PRIVATE_KEY }}
          app-client-id: ${{ vars.ORG_REPO_USER_APP_ID }}

      - name: Checkout
        id: checkout
        uses: actions/checkout@v7
        with:
          token: ${{ steps.auth-token.outputs.token }}

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v7
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: ${{ inputs.node-caching }}

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Setup Ruby
        id: setup-ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby

      - uses: licensee/setup-licensed@v1.3.2
        with:
          version: ${{ inputs.licensed-version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # If this is a workflow_dispatch event, update the cached licenses.
      - if: ${{ github.event_name == 'workflow_dispatch' }}
        name: Update Licenses
        id: update-licenses
        run: licensed cache

      # Then, commit the updated licenses to the repository.
      - if: ${{ github.event_name == 'workflow_dispatch' }}
        name: Commit Licenses
        id: commit-licenses
        env:
          COMMIT_PREFIX: ${{ inputs.commit-prefix != '' && format('{0}:{1}', inputs.commit-prefix, ' ') || '' }}
        run: |
          git config --local user.email "licensed-ci@users.noreply.github.com"
          git config --local user.name "licensed-ci"
          git add .
          git commit -m "${{ env.COMMIT_PREFIX }}${{ inputs.commit-message }}"
          git push

      # Last, check the status of the cached licenses.
      - name: Check Licenses
        id: check-licenses
        run: licensed status
