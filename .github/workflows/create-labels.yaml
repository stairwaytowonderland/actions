name: Labels Create

on:
  workflow_call:
    inputs:
      owner:
        description: 'GitHub organization or user that owns the repository'
        required: false
        type: string
      repo:
        description: 'GitHub repository name (if not the current repository)'
        required: false
        type: string
      dry-run:
        description: 'Dry run'
        required: true
        type: boolean
        default: true
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        required: true
        type: boolean
        default: false
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        required: false
        type: string
    secrets:
      github-token:
        description: 'GitHub token for authentication'
        required: false

  workflow_dispatch:
    inputs:
      owner:
        description: 'GitHub organization or user that owns the repository'
        required: false
        type: string
      repo:
        description: 'GitHub repository name (if not the current repository)'
        required: false
        type: string
      dry-run:
        description: 'Dry run'
        required: true
        type: boolean
        default: true
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        required: true
        type: boolean
        default: false
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        required: false
        type: string

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout shared actions repo
        uses: actions/checkout@v6
        with:
          repository: stairwaytowonderland/actions
          ref: ${{ inputs.ref }}
          path: ./.actions
          sparse-checkout: |
            .github

      - name: Create labels
        uses: ./.actions/.github/actions/labels-create-action
        with:
          owner: ${{ inputs.owner || github.repository_owner }}
          repo: ${{ inputs.repo || github.repository }}
          dry-run: ${{ inputs.dry-run }}
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          update-existing: ${{ inputs.update-existing }}
