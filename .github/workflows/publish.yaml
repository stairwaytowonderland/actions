name: Publish a Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        type: string
        required: true
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        type: string
      action-ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'

jobs:
  repo-info:
    name: Get repo info
    runs-on: ubuntu-latest
    outputs:
      repo-owner: ${{ steps.repo-info.outputs.repo-owner }}
      repo-name: ${{ steps.repo-info.outputs.repo-name }}
    steps:
      - name: Checkout shared actions repo
        uses: actions/checkout@v6
        with:
          repository: stairwaytowonderland/actions
          path: ./.actions
          sparse-checkout: |
            .github
          ref: ${{ inputs.action-ref }}
      - name: Get repo info
        id: repo-info
        uses: ./.actions/.github/actions/repo-info-action

  publish:
    name: Publish GitHub Release
    needs: [repo-info]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      release-url: ${{ steps.publish.outputs.release-url }}
      release-tag: ${{ steps.publish.outputs.release-tag }}
      release-sha: ${{ steps.publish.outputs.release-sha }}
      release-notes-b64: ${{ steps.publish.outputs.release-notes-b64 }}
      release-published: ${{ steps.publish.outputs.release-published }}

    steps:
      # Resolve the tag from whichever trigger fired:
      #   push: tags                        → github.ref_name  (e.g. v1.2.3)
      #   workflow_dispatch / workflow_call → inputs.tag
      - name: Set vars
        id: vars
        run: |
          echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Checkout at the input tag so setuptools-scm sees it and stamps the
      # correct version into the wheel metadata.
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Get auth token
        id: auth-token
        uses: stairwaytowonderland/actions/.github/actions/auth-token-action@v1
        with:
          github-token: ${{ secrets.github-token }}
          app-private-key: ${{ secrets.ORG_REPO_USER_PRIVATE_KEY }}
          app-client-id: ${{ vars.ORG_REPO_USER_APP_ID }}

      - name: Publish release
        id: publish
        uses: stairwaytowonderland/node-semantic-release@v1
        with:
          publish: true
          github-token: ${{ steps.auth-token.outputs.auth-token }}
          notes-b64: ${{ inputs.notes-b64 }}
          tag: ${{ steps.vars.outputs.tag }}
